global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'besu-permission-plugin'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'besu-permission'
    static_configs:
      - targets: ['besu:9090']
    scrape_interval: 5s
    metrics_path: '/metrics'

  - job_name: 'besu-rpc'
    static_configs:
      - targets: ['besu:8545']
    scrape_interval: 10s

# Reglas de alerta (opcional)
rule_files:
  # - '/etc/prometheus/rules.yml'

alerting:
  alertmanagers:
    # - static_configs:
    #     - targets: ['localhost:9093']
